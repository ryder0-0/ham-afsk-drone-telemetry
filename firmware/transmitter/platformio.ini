; FILE: firmware/transmitter/platformio.ini
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600

lib_deps =
    file://../common

build_flags =
    -std=gnu++17
    -Wall
    -DTELEM_MODE_SUMMARY=0      ; 0 = MAVLink tunnel, 1 = telemetry summary
    -DCORE_DEBUG_LEVEL=0

; Uncomment to build in summary-only mode:
; build_flags = ... -DTELEM_MODE_SUMMARY=1
